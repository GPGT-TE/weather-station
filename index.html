<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPG*T VDA — Weather Station</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --card:   #0f1e35;
  --border: rgba(255,255,255,0.09);
  --accent: #00b4d8;
  --orange: #ff8c42;
  --text:   #e8edf5;
  --muted:  #7a8fa6;
  --green:  #00e676;
  --red:    #ff4444;
  --label:  rgba(255,255,255,0.55);
}
html,body { height:100%; }
body { min-height:100vh; color:var(--text); font-family:'Inter',sans-serif; font-size:14px; overflow:hidden; transition:background 3s ease; }
#skyBg { position:fixed; inset:0; z-index:0; background:linear-gradient(160deg,#0d1b2e 0%,#1a4a7a 100%); transition:background 4s ease; }
.page { position:relative; z-index:1; display:flex; flex-direction:column; height:100vh; padding:14px 18px 10px; gap:8px; }

/* HEADER */
.header { display:flex; justify-content:space-between; align-items:flex-start; flex-shrink:0; }
.station-id { font-size:11px; font-weight:700; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:1px; }
.title-row { display:flex; align-items:center; gap:10px; }
h1 { font-size:30px; font-weight:800; letter-spacing:-0.02em; line-height:1.05; }
.wingfoot { height:32px; width:auto; opacity:0.9; filter:drop-shadow(0 0 5px rgba(0,180,216,0.3)); }
.site-sub { font-size:12px; color:var(--muted); margin-top:1px; }
.header-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.live-row { display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--green); }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 7px var(--green); animation:blink 2s infinite; }
.live-dot.offline { background:var(--red); box-shadow:0 0 7px var(--red); animation:none; }
.live-dot.loading { background:var(--muted); box-shadow:none; animation:none; }
.updated-time { font-size:11px; color:var(--muted); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* MAIN ROW */
.main-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; flex-shrink:0; }
.hero-card { background:rgba(10,20,42,0.72); border:1px solid var(--border); border-radius:12px; display:flex; flex-direction:row; backdrop-filter:blur(6px); overflow:hidden; }
.hero-temp { flex:1.05; padding:18px 20px; display:flex; flex-direction:column; justify-content:center; border-right:1px solid var(--border); }
.hero-lbl { font-size:10px; font-weight:700; letter-spacing:0.16em; color:var(--label); text-transform:uppercase; margin-bottom:6px; }
.temp-big { font-size:clamp(52px,6.5vw,76px); font-weight:800; letter-spacing:-0.03em; line-height:1; }
.temp-big sup { font-size:26px; font-weight:400; color:var(--muted); }
.feels-line { font-size:12px; color:var(--muted); margin-top:8px; }
.cond-badge { display:inline-block; margin-top:10px; padding:4px 12px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); }
.dl-btn { display:inline-flex; align-items:center; gap:6px; margin-top:10px; padding:6px 14px; border-radius:8px; background:transparent; border:1px solid rgba(255,255,255,0.18); color:var(--text); font-family:'Inter',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:border-color 0.2s,background 0.2s; }
.dl-btn:hover { border-color:rgba(255,255,255,0.35); background:rgba(255,255,255,0.05); }
.dl-btn:disabled { opacity:0.4; cursor:not-allowed; }
.dl-btn svg { width:12px; height:12px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.hero-wind { flex:1; padding:18px 20px; display:flex; flex-direction:row; align-items:center; }
.wind-left { flex:1; }
.wind-speed-val { font-size:clamp(22px,3vw,36px); font-weight:800; letter-spacing:-0.02em; line-height:1.1; }
.wind-right { flex:1; border-left:1px solid var(--border); padding-left:20px; }
.wind-avg-val { font-size:clamp(26px,3.5vw,44px); font-weight:800; color:var(--orange); letter-spacing:-0.02em; line-height:1; }

/* CHART */
.chart-card { background:rgba(10,20,42,0.72); border:1px solid var(--border); border-radius:12px; padding:12px 16px 10px; display:flex; flex-direction:column; backdrop-filter:blur(6px); }
.chart-title { font-size:10px; font-weight:700; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; text-align:center; margin-bottom:6px; flex-shrink:0; }
#windChart { flex:1; width:100%; display:block; }

/* SECTION LABELS */
.section-lbl { font-size:10px; font-weight:700; letter-spacing:0.18em; color:var(--label); text-transform:uppercase; flex-shrink:0; padding-left:2px; }

/* CONDITIONS */
.conditions-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; flex-shrink:0; }

/* PRECIP */
.precip-row { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; flex:1; min-height:0; }

.card { background:rgba(10,20,42,0.72); border:1px solid var(--border); border-radius:10px; padding:14px 16px; display:flex; flex-direction:column; justify-content:space-between; backdrop-filter:blur(4px); }
.card-lbl { font-size:10px; font-weight:700; letter-spacing:0.14em; color:var(--label); text-transform:uppercase; }
.card-val { font-size:clamp(20px,2.2vw,30px); font-weight:700; color:var(--accent); margin-top:4px; }
.card-val.white { color:var(--text); }
.card-bar { height:3px; background:rgba(255,255,255,0.07); border-radius:2px; margin-top:8px; overflow:hidden; }
.card-bar-fill { height:100%; border-radius:2px; background:var(--accent); transition:width 0.8s ease; width:0%; }
</style>
</head>
<body>
<div id="skyBg"></div>
<div class="page">

  <div class="header">
    <div>
      <div class="station-id">Davis Vantage Pro 2</div>
      <div class="title-row">
        <h1>Weather Station</h1>
        <img class="wingfoot" id="wingfootImg" src="" alt="Goodyear">
      </div>
      <div class="site-sub">GPG*T VDA &mdash; San Angelo, TX</div>
    </div>
    <div class="header-right">
      <div class="live-row">
        <span class="live-dot loading" id="liveDot"></span>
        <span id="liveLabel">LIVE</span>
      </div>
      <div class="updated-time">Updated <span id="updatedTime">—</span></div>
    </div>
  </div>

  <div class="main-row">
    <div class="hero-card">
      <div class="hero-temp">
        <div class="hero-lbl">Outside Temperature</div>
        <div class="temp-big"><span id="temperature">—</span><sup>°F</sup></div>
        <div class="feels-line" id="feelsLine">Feels like — &middot; Dewpoint —</div>
        <div class="cond-badge" id="condBadge">—</div>
        <button class="dl-btn" id="dlBtn" onclick="downloadHistory()">
          <svg viewBox="0 0 24 24"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/></svg>
          Download 30-Day History
        </button>
      </div>
      <div class="hero-wind">
        <div class="wind-left">
          <div class="hero-lbl">Wind</div>
          <div class="wind-speed-val" id="wind">—</div>
        </div>
        <div class="wind-right">
          <div class="hero-lbl">10-Min Avg Wind</div>
          <div class="wind-avg-val" id="windAvg">—</div>
        </div>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Wind Speed &mdash; Last 4 Days (10-Min Avg)</div>
      <canvas id="windChart"></canvas>
    </div>
  </div>

  <div class="section-lbl">Conditions</div>
  <div class="conditions-row">
    <div class="card">
      <div class="card-lbl">Humidity</div>
      <div class="card-val" id="humidity">—</div>
    </div>
    <div class="card">
      <div class="card-lbl">Dewpoint</div>
      <div class="card-val white" id="dewpoint">—</div>
    </div>
    <div class="card">
      <div class="card-lbl">Station Time</div>
      <div class="card-val white" style="font-size:clamp(14px,1.6vw,20px)" id="stationTime">—</div>
    </div>
  </div>

  <div class="section-lbl">Precipitation</div>
  <div class="precip-row">
    <div class="card">
      <div class="card-lbl">Today</div>
      <div class="card-val" id="rainToday">—</div>
      <div class="card-bar"><div class="card-bar-fill" id="rainTodayBar"></div></div>
    </div>
    <div class="card">
      <div class="card-lbl">Rain Rate</div>
      <div class="card-val white" id="rainRate">—</div>
      <div class="card-bar"><div class="card-bar-fill" id="rainRateBar"></div></div>
    </div>
    <div class="card">
      <div class="card-lbl">Monthly</div>
      <div class="card-val white" id="rainMonthly">—</div>
      <div class="card-bar"><div class="card-bar-fill" id="rainMonthlyBar"></div></div>
    </div>
    <div class="card">
      <div class="card-lbl">Yearly</div>
      <div class="card-val white" id="rainYearly">—</div>
      <div class="card-bar"><div class="card-bar-fill" id="rainYearlyBar"></div></div>
    </div>
  </div>

</div>

function set(id,val){ const e=document.getElementById(id); if(e) e.textContent=val||'—'; }
function bar(id,raw,max){ const e=document.getElementById(id); if(!e) return; const n=parseFloat((raw||'').replace(/[^\d.]/g,'')); e.style.width=isNaN(n)?'0%':Math.min(100,(n/max)*100)+'%'; }

function blendHex(a,b,t){
  const ah=parseInt(a.slice(1),16),bh=parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff,ag=(ah>>8)&0xff,ab=ah&0xff;
  const br=(bh>>16)&0xff,bg=(bh>>8)&0xff,bb=bh&0xff;
  const rr=Math.round(ar+(br-ar)*t),rg=Math.round(ag+(bg-ag)*t),rb=Math.round(ab+(bb-ab)*t);
  return '#'+((1<<24)+(rr<<16)+(rg<<8)+rb).toString(16).slice(1);
}
function updateSky(tempF,rainRate){
  const hour=new Date().getHours();
  let top,bot;
  if(hour>=5&&hour<8){top='#1a1a2e';bot='#e07b39';}
  else if(hour>=8&&hour<18){top='#0d1b2e';bot='#1a4a7a';}
  else if(hour>=18&&hour<21){top='#1a1a2e';bot='#c0392b';}
  else{top='#05080f';bot='#0d1b2e';}
  if(!isNaN(tempF)){
    if(tempF>=95) bot=blendHex(bot,'#7a1a00',0.45);
    else if(tempF>=85) bot=blendHex(bot,'#a0340a',0.3);
    else if(tempF>=75) bot=blendHex(bot,'#8a4a00',0.2);
    else if(tempF<=32) bot=blendHex(bot,'#0a2a5a',0.35);
    else if(tempF<=45) bot=blendHex(bot,'#0a3060',0.2);
  }
  if(rainRate>0){top=blendHex(top,'#000510',0.4);bot=blendHex(bot,'#091422',0.4);}
  document.getElementById('skyBg').style.background=`linear-gradient(160deg,${top} 0%,${bot} 100%)`;
}
function getCondition(t,rainRate,hum){
  if(rainRate>0.5) return 'Heavy Rain';
  if(rainRate>0)   return 'Light Rain';
  if(hum>85)       return 'Humid';
  if(t>=100)       return 'Extreme Heat';
  if(t>=90)        return 'Hot';
  if(t>=75)        return 'Warm';
  if(t>=60)        return 'Pleasant';
  if(t>=45)        return 'Cool';
  if(t>=32)        return 'Cold';
  return 'Freezing';
}

async function fetchWeather(){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/weather_current?select=*&limit=1`,{headers:{apikey:SUPA_ANON,Authorization:`Bearer ${SUPA_ANON}`}});
    const rows=await res.json();
    if(!rows||!rows.length) throw new Error('no data');
    const d=rows[0];
    if(d.updated_at){
      const age=(Date.now()-new Date(d.updated_at).getTime())/60000;
      const dot=document.getElementById('liveDot');
      const lbl=document.getElementById('liveLabel');
      if(age>STALE_MIN){dot.className='live-dot offline';lbl.textContent='Offline';lbl.style.color='var(--red)';}
      else{dot.className='live-dot';lbl.textContent='LIVE';lbl.style.color='var(--green)';}
      set('updatedTime',new Date(d.updated_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    }
    const tempNum=parseFloat((d.temperature||'').replace(/[^\d.]/g,''));
    set('temperature',isNaN(tempNum)?'—':tempNum.toFixed(1));
    const heatIdx=parseFloat((d.heat_index||'').replace(/[^\d.]/g,''));
    const windChill=parseFloat((d.wind_chill||'').replace(/[^\d.]/g,''));
    const dewNum=parseFloat((d.dewpoint||'').replace(/[^\d.]/g,''));
    const feelsNum=!isNaN(heatIdx)?heatIdx:windChill;
    set('feelsLine',`Feels like ${isNaN(feelsNum)?'—':feelsNum.toFixed(1)}°F · Dewpoint ${isNaN(dewNum)?'—':dewNum.toFixed(1)}°F`);
    const humNum=parseFloat((d.humidity||'').replace(/[^\d.]/g,''));
    const rainRate=parseFloat((d.rain_rate||'').replace(/[^\d.]/g,''));
    set('condBadge',getCondition(tempNum,rainRate,humNum));
    updateSky(tempNum,rainRate);
    set('wind',d.wind||'—');
    set('windAvg',d.wind_avg?d.wind_avg.replace(/\s*mph/i,'').trim()+' mph':(d.wind_gust||'—'));
    set('humidity',d.humidity||'—');
    set('dewpoint',d.dewpoint||'—');
    set('stationTime',d.station_time||'—');
    set('rainToday',d.rain_today||'—');
    set('rainRate',d.rain_rate||'—');
    set('rainMonthly',d.rain_monthly||'—');
    set('rainYearly',d.rain_yearly||'—');
    bar('rainTodayBar',d.rain_today,2);
    bar('rainRateBar',d.rain_rate,1);
    bar('rainMonthlyBar',d.rain_monthly,5);
    bar('rainYearlyBar',d.rain_yearly,20);
  }catch(err){
    const dot=document.getElementById('liveDot');
    const lbl=document.getElementById('liveLabel');
    dot.className='live-dot offline';
    lbl.textContent='Offline';
    lbl.style.color='var(--red)';
  }
}

// CHART
const canvas=document.getElementById('windChart');
const ctx=canvas.getContext('2d');
let chartData={labels:[],avgs:[]};

async function fetchChartData(){
  try{
    // Range: midnight 4 days ago to midnight today = yesterday + 3 prior complete days
    const now=new Date();
    const midnightToday=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0);
    const midnightFourDaysAgo=new Date(midnightToday.getTime()-4*24*60*60*1000);
    const since=midnightFourDaysAgo.toISOString().replace(/\.\d+Z$/,'.000Z');
    const until=midnightToday.toISOString().replace(/\.\d+Z$/,'.000Z');
    const directUrl=`${SUPA_URL}/rest/v1/weather_history?select=logged_at,wind_avg_mph,wind_speed&logged_at=gte.${since}&logged_at=lt.${until}&order=logged_at.asc`;
    
    // Fetch with pagination - get all pages
    let allRows=[];
    let from=0;
    const pageSize=1000;
    while(true){
      const res=await fetch(directUrl,{headers:{apikey:SUPA_SVC,Authorization:`Bearer ${SUPA_SVC}`,Range:`${from}-${from+pageSize-1}`,'Range-Unit':'items',Prefer:'count=none'}});
      const page=await res.json();
      if(!page||!page.length) break;
      allRows=allRows.concat(page);
      if(page.length<pageSize) break;
      from+=pageSize;
    }
    if(!allRows.length) return;
    
    // Downsample to one point per 30 minutes to keep chart clean
    const buckets={};
    allRows.forEach(r=>{
      const d=new Date(r.logged_at);
      // Round to nearest 30min bucket
      d.setMinutes(d.getMinutes()<30?0:30,0,0);
      const key=d.getTime();
      if(!buckets[key]) buckets[key]={sum:0,count:0,date:new Date(d)};
      const v=r.wind_avg_mph??r.wind_speed;
      if(v!==null&&v!==undefined){buckets[key].sum+=v;buckets[key].count++;}
    });
    const sorted=Object.values(buckets).sort((a,b)=>a.date-b.date);
    chartData.labels=sorted.map(b=>b.date);
    chartData.avgs=sorted.map(b=>b.count>0?Math.round(b.sum/b.count*10)/10:null);
    drawChart();
  }catch(e){console.error('chart',e);}
}

function drawChart(){
  const w=canvas.width,h=canvas.height;
  if(!w||!h||!chartData.labels.length) return;
  ctx.clearRect(0,0,w,h);

  const data=chartData.avgs;
  const valid=data.filter(v=>v!==null);
  if(!valid.length) return;

  const maxVal=Math.max(...valid,1);
  const PAD_L=30,PAD_R=8,PAD_T=10,PAD_B=24;
  const cW=w-PAD_L-PAD_R,cH=h-PAD_T-PAD_B;

  const fontSize=Math.max(7,Math.floor(h*0.042));
  ctx.font=`${fontSize}px Inter,sans-serif`;

  // Y gridlines + labels
  const ySteps=4;
  ctx.lineWidth=1;
  ctx.textAlign='right';
  for(let i=0;i<=ySteps;i++){
    const val=Math.round(maxVal*(i/ySteps));
    const y=PAD_T+cH-(cH*i/ySteps);
    ctx.setLineDash([]);
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.beginPath();ctx.moveTo(PAD_L,y);ctx.lineTo(PAD_L+cW,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.fillText(val,PAD_L-4,y+3);
  }

  // X axis: group by calendar day using actual timestamps
  const tStart=chartData.labels[0].getTime();
  const tEnd=chartData.labels[chartData.labels.length-1].getTime();
  const tRange=tEnd-tStart||1;

  const dayMap={};
  chartData.labels.forEach((dt)=>{
    const d=new Date(dt);
    d.setHours(0,0,0,0);
    const key=d.getTime();
    if(!dayMap[key]) dayMap[key]={date:d,midnight:d.getTime(),tSum:0,count:0};
    dayMap[key].tSum+=dt.getTime();
    dayMap[key].count++;
  });
  const days=Object.values(dayMap).sort((a,b)=>a.date-b.date);
  days.forEach(d=>{ d.tMid=d.tSum/d.count; });

  // Draw dashed vertical lines at each day boundary (midnight), skip first
  ctx.setLineDash([3,4]);
  ctx.lineWidth=1;
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  days.forEach(({midnight},i)=>{
    if(i===0) return; // skip leftmost edge
    const x=PAD_L+((midnight-tStart)/tRange)*cW;
    if(x>PAD_L&&x<PAD_L+cW){
      ctx.beginPath();ctx.moveTo(x,PAD_T);ctx.lineTo(x,PAD_T+cH);ctx.stroke();
    }
  });
  ctx.setLineDash([]);

  // Day labels centered within each day's data
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.textAlign='center';
  ctx.font=`${fontSize}px Inter,sans-serif`;
  days.forEach(({date,tMid})=>{
    const x=PAD_L+((tMid-tStart)/tRange)*cW;
    const label=date.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'});
    ctx.fillText(label,x,h-4);
  });

  // Draw line
  ctx.beginPath();
  ctx.strokeStyle='#ff8c42';
  ctx.lineWidth=1.5;
  ctx.lineJoin='round';
  let started=false;
  chartData.labels.forEach((dt,i)=>{
    if(data[i]===null) return;
    const x=PAD_L+((dt.getTime()-tStart)/tRange)*cW;
    const y=PAD_T+cH-((data[i]/maxVal)*cH);
    if(!started){ctx.moveTo(x,y);started=true;}else{ctx.lineTo(x,y);}
  });
  ctx.stroke();
}

function resizeCanvas(){
  const r=canvas.getBoundingClientRect();
  canvas.width=Math.floor(r.width);
  canvas.height=Math.floor(r.height);
  drawChart();
}

async function downloadHistory(){
  const btn=document.getElementById('dlBtn');
  btn.disabled=true;btn.textContent='Fetching...';
  try{
    const since30=new Date(Date.now()-30*24*60*60*1000).toISOString().split('.')[0]+'.000Z';
    const dlUrl=`${SUPA_URL}/rest/v1/weather_history?select=*&logged_at=gte.${since30}&order=logged_at.asc`;
    let allRows=[],from=0;
    const pageSize=1000;
    while(true){
      const res=await fetch(dlUrl,{headers:{apikey:SUPA_SVC,Authorization:`Bearer ${SUPA_SVC}`,Range:`${from}-${from+pageSize-1}`,'Range-Unit':'items',Prefer:'count=none'}});
      const page=await res.json();
      if(!page||!page.length) break;
      allRows=allRows.concat(page);
      if(page.length<pageSize) break;
      from+=pageSize;
      btn.textContent=`Fetching... ${allRows.length} rows`;
    }
    if(!allRows.length){alert('No history data yet.');return;}
    const headers=Object.keys(allRows[0]).join(',');
    const csv=[headers,...allRows.map(r=>Object.values(r).map(v=>v===null?'':String(v).includes(',')?`"${v}"`:v).join(','))].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`weather_history_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }catch(e){alert('Download failed: '+e.message);}
  finally{
    btn.disabled=false;
    btn.innerHTML='<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M12 3v13M7 11l5 5 5-5"/><path d="M5 20h14"/></svg> Download 30-Day History';
  }
}

window.addEventListener('resize',resizeCanvas);
fetchWeather();
fetchChartData();
setInterval(fetchWeather,60000);
setInterval(fetchChartData,60000);
setTimeout(resizeCanvas,150);
</script>
